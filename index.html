<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Trilha da Herpetofauna — Controle do Professor(a)</title>
  <style>
    :root {
      --bg-1: #f6f1e7;
      --bg-2: #e8dcc4;
      --panel: rgba(255, 251, 243, 0.96);
      --panel-strong: #fffaf1;
      --ink: #2d241a;
      --muted: #786a57;
      --gold: #b98b3f;
      --gold-dark: #926a2f;
      --leaf: #55753c;
      --leaf-soft: #e6efdc;
      --frog: #4a8d59;
      --snake: #8b5e3c;
      --danger: #b53a2d;
      --danger-soft: #fae2de;
      --line: #ddcfb7;
      --shadow: 0 10px 28px rgba(55, 37, 13, 0.12);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background: 
        radial-gradient(circle at top left, rgba(255,255,255,.45), transparent 22%),
        radial-gradient(circle at bottom right, rgba(255,255,255,.32), transparent 20%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 14px;
      padding-bottom: 110px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(255,250,241,.98), rgba(249,241,223,.98));
      border: 1px solid rgba(185,139,63,.22);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 14px;
    }

    .title-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f4ead5;
      color: var(--gold-dark);
      border: 1px solid rgba(185,139,63,.28);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    h1 { margin: 0; font-size: clamp(26px, 6vw, 36px); line-height: 1.04; }

    .subtitle { margin-top: 10px; color: var(--muted); font-size: 14px; line-height: 1.45; }

    .mobile-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }

    .card {
      background: var(--panel);
      border: 1px solid rgba(119, 91, 41, 0.14);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      margin-bottom: 14px;
      padding: 16px;
    }

    .section-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 12px; }

    .section-note { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .stack { display: grid; gap: 12px; }

    label { display: block; margin-bottom: 6px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--muted); }

    input, select, button { font: inherit; }

    input {
      width: 100%; min-height: 54px; padding: 14px; border-radius: 16px;
      border: 1px solid #ddcfb7; background: #fffdf8; font-size: 16px;
    }

    button {
      border: none; border-radius: 16px; min-height: 56px; padding: 14px;
      cursor: pointer; font-weight: 800; transition: transform .1s;
    }

    button:active { transform: scale(0.98); }

    .btn-primary { color: white; background: linear-gradient(180deg, var(--gold), var(--gold-dark)); }
    .btn-success { color: white; background: linear-gradient(180deg, #679549, #4f7838); }
    .btn-error { color: white; background: linear-gradient(180deg, #d65b4f, #b53a2d); }
    .btn-secondary { background: #f5ead6; color: var(--ink); border: 1px solid #dcc; }
    .btn-danger { background: #c84b3f; color: white; }

    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .summary-box { padding: 12px; border-radius: 14px; background: white; border: 1px solid #eee; }
    .summary-label { font-size: 10px; color: var(--muted); text-transform: uppercase; }
    .summary-value { font-weight: 800; font-size: 15px; }

    .quick-group-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; }
    .quick-group-btn { background: white; border: 2px solid #eee; border-radius: 14px; padding: 8px; text-align: left; height: auto; }
    .quick-group-btn.active { border-color: var(--gold); background: #fffcf5; }

    .placar-item { 
      display: flex; justify-content: space-between; align-items: center; 
      padding: 12px; background: white; border-radius: 16px; margin-bottom: 8px; border: 1px solid #eee;
    }
    .placar-item.winner { border-color: var(--leaf); background: #f4faef; }

    .house-board { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; }
    .house { height: 30px; font-size: 10px; display: grid; place-items: center; background: white; border: 1px solid #eee; border-radius: 6px; }
    .house.visited { background: var(--leaf); color: white; }

    .history-item { padding: 10px; background: white; border-radius: 12px; margin-bottom: 8px; border-left: 4px solid var(--gold); }
    .notice { padding: 12px; border-radius: 12px; margin: 10px 0; font-size: 14px; display: none; }
    .notice.show { display: block; }
    .notice.ok { background: #e7f3e4; color: var(--leaf); }
    .notice.bad { background: var(--danger-soft); color: var(--danger); }
    
    .hidden { display: none !important; }

    @media (max-width: 600px) {
      .house-board { grid-template-columns: repeat(5, 1fr); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="title-badge">🐍 Trilha da Herpetofauna 🐸</div>
      <h1>Controle do Professor(a)</h1>
      <div class="subtitle">Gestão de partida em tempo real para atividades pedagógicas.</div>
      <div class="mobile-actions">
        <button class="btn-secondary" id="btnExportar">📦 PDF / Imprimir</button>
        <button class="btn-danger" id="btnResetar">🗑️ Apagar Tudo</button>
      </div>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>Equipes</h2>
        <button class="btn-secondary" id="btnToggleEquipes">Ocultar</button>
      </div>
      <div id="equipesContent">
        <div id="grupoInputs" class="stack"></div>
      </div>
    </section>

    <section class="card">
      <h2>Registrar Jogada</h2>
      <div class="stack">
        <label>Selecione a Equipe</label>
        <div id="quickGroupGrid" class="quick-group-grid"></div>
        
        <label>Casa Alcançada (1-50)</label>
        <input id="casaInput" type="number" min="1" max="50" placeholder="Ex: 12" inputmode="numeric">

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <button class="btn-success" id="btnAcertou">✅ Acertou</button>
          <button class="btn-error" id="btnErrou">❌ Errou</button>
        </div>
        <button class="btn-primary" id="btnRegistrar" style="margin-top:10px">🎯 Registrar Jogada</button>
      </div>
      <div id="feedback" class="notice"></div>
      <button class="btn-secondary" id="btnDesfazer" style="width: 100%; margin-top: 10px; min-height: 40px;">↩️ Desfazer Última</button>
    </section>

    <section class="card">
      <h2>Ranking Atual</h2>
      <div id="tabelaPlacar"></div>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>Mapa de Casas</h2>
        <button class="btn-secondary" id="btnToggleCasas">Ver</button>
      </div>
      <div id="casasContent" class="hidden">
        <div id="casasVisitadas" class="house-board"></div>
      </div>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>Histórico</h2>
        <button class="btn-secondary" id="btnToggleHistorico">Ver</button>
      </div>
      <div id="historicoContent" class="hidden">
        <div id="historico"></div>
      </div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = 'trilha_herpeto_v1';
    const TOTAL_GRUPOS = 5;
    const TOTAL_CASAS = 50;

    let grupoSelecionadoId = 1;
    let resultadoSelecionado = 'acertou';

    function criarEstadoInicial() {
      return {
        id: `PARTIDA-${Date.now()}`,
        grupos: Array.from({ length: TOTAL_GRUPOS }, (_, i) => ({
          id: i + 1,
          nome: `Equipe ${i + 1}`,
          casaAtual: '-',
          pontos: 0
        })),
        jogadas: [],
        casasVisitadas: []
      };
    }

    let estado = JSON.parse(localStorage.getItem(STORAGE_KEY)) || criarEstadoInicial();

    function salvar() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(estado));
      render();
    }

    function render() {
      // Inputs de Nomes
      const inputsContainer = document.getElementById('grupoInputs');
      if (inputsContainer.innerHTML === '') {
        estado.grupos.forEach(g => {
          const div = document.createElement('div');
          div.innerHTML = `<label>Nome Equipe ${g.id}</label><input value="${g.nome}" oninput="updateNome(${g.id}, this.value)">`;
          inputsContainer.appendChild(div);
        });
      }

      // Quick Select Equipes
      document.getElementById('quickGroupGrid').innerHTML = estado.grupos.map(g => `
        <button class="quick-group-btn ${g.id === grupoSelecionadoId ? 'active' : ''}" onclick="selectGrupo(${g.id})">
          <b>${g.nome}</b><br><small>Casa: ${g.casaAtual} | Pts: ${g.pontos}</small>
        </button>
      `).join('');

      // Placar
      const ranking = [...estado.grupos].sort((a,b) => b.pontos - a.pontos);
      document.getElementById('tabelaPlacar').innerHTML = ranking.map((g, i) => `
        <div class="placar-item ${i === 0 && g.pontos > 0 ? 'winner' : ''}">
          <span>${i+1}º <b>${g.nome}</b></span>
          <span>${g.pontos} Pts (Casa ${g.casaAtual})</span>
        </div>
      `).join('');

      // Casas
      document.getElementById('casasVisitadas').innerHTML = Array.from({length: 50}, (_, i) => i+1).map(c => `
        <div class="house ${estado.casasVisitadas.includes(c) ? 'visited' : ''}">${c}</div>
      `).join('');

      // Histórico
      document.getElementById('historico').innerHTML = [...estado.jogadas].reverse().map(j => `
        <div class="history-item">
          <b>${j.equipe}</b>: Casa ${j.casa} - ${j.acerto ? '✅ Acertou' : '❌ Errou'}
        </div>
      `).join('') || 'Nenhuma jogada.';
    }

    window.updateNome = (id, val) => {
      estado.grupos.find(g => g.id === id).nome = val || `Equipe ${id}`;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(estado));
      render();
    };

    window.selectGrupo = (id) => {
      grupoSelecionadoId = id;
      render();
    };

    document.getElementById('btnAcertou').onclick = () => { resultadoSelecionado = 'acertou'; msg('ok', 'Modo: Acerto Selecionado'); };
    document.getElementById('btnErrou').onclick = () => { resultadoSelecionado = 'errou'; msg('bad', 'Modo: Erro Selecionado'); };

    document.getElementById('btnRegistrar').onclick = () => {
      const casa = parseInt(document.getElementById('casaInput').value);
      if (!casa || casa < 1 || casa > 50) return msg('bad', 'Casa Inválida (1-50)');
      if (estado.casasVisitadas.includes(casa)) return msg('bad', 'Casa já utilizada!');

      const gp = estado.grupos.find(g => g.id === grupoSelecionadoId);
      const acerto = resultadoSelecionado === 'acertou';
      
      gp.pontos += acerto ? 1 : 0;
      gp.casaAtual = casa;
      estado.casasVisitadas.push(casa);
      estado.jogadas.push({ equipe: gp.nome, casa, acerto });
      
      document.getElementById('casaInput').value = '';
      msg('ok', 'Registrado com sucesso!');
      salvar();
    };

    document.getElementById('btnDesfazer').onclick = () => {
      if (estado.jogadas.length === 0) return;
      const ultima = estado.jogadas.pop();
      estado.casasVisitadas = estado.casasVisitadas.filter(c => c !== ultima.casa);
      const gp = estado.grupos.find(g => g.nome === ultima.equipe);
      if (ultima.acerto) gp.pontos -= 1;
      const anterior = [...estado.jogadas].reverse().find(j => j.equipe === gp.nome);
      gp.casaAtual = anterior ? anterior.casa : '-';
      salvar();
    };

    document.getElementById('btnResetar').onclick = () => {
      if(confirm('Apagar toda a partida?')) {
        estado = criarEstadoInicial();
        document.getElementById('grupoInputs').innerHTML = '';
        salvar();
      }
    };

    document.getElementById('btnExportar').onclick = () => window.print();

    function msg(tipo, texto) {
      const f = document.getElementById('feedback');
      f.className = `notice show ${tipo}`;
      f.innerText = texto;
      setTimeout(() => f.classList.remove('show'), 3000);
    }

    function setupToggle(btnId, contId) {
      document.getElementById(btnId).onclick = function() {
        const c = document.getElementById(contId);
        c.classList.toggle('hidden');
        this.innerText = c.classList.contains('hidden') ? 'Ver' : 'Ocultar';
      };
    }

    setupToggle('btnToggleEquipes', 'equipesContent');
    setupToggle('btnToggleCasas', 'casasContent');
    setupToggle('btnToggleHistorico', 'historicoContent');

    render();
  </script>
</body>
</html>
