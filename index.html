<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Trilha da Herpetofauna — Controle do Professor(a)</title>
  <style>
    :root {
      --bg-1: #f6f1e7;
      --bg-2: #e8dcc4;
      --panel: rgba(255, 251, 243, 0.96);
      --ink: #2d241a;
      --muted: #786a57;
      --gold: #b98b3f;
      --gold-dark: #926a2f;
      --leaf: #55753c;
      --leaf-soft: #e6efdc;
      --danger: #b53a2d;
      --danger-soft: #fae2de;
      --shadow: 0 10px 28px rgba(55, 37, 13, 0.12);
      --radius-xl: 24px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: "Trebuchet MS", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
      padding: 14px;
      padding-bottom: 100px;
    }

    .wrap { max-width: 800px; margin: 0 auto; }

    .hero {
      background: white;
      border-radius: var(--radius-xl);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 15px;
      text-align: center;
    }

    .card {
      background: var(--panel);
      border-radius: var(--radius-xl);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 15px;
    }

    .stack { display: grid; gap: 12px; }

    input {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      padding: 15px;
      border-radius: 12px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-primary { background: var(--gold); color: white; width: 100%; font-size: 18px; }
    .btn-secondary { background: #e2d7c5; color: var(--ink); }
    .btn-success { background: var(--leaf); color: white; flex: 1; }
    .btn-error { background: var(--danger); color: white; flex: 1; }
    .btn-danger { background: #999; color: white; }

    .quick-group-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 15px; }
    .group-btn {
      background: white;
      border: 2px solid transparent;
      padding: 10px;
      border-radius: 15px;
      text-align: left;
    }
    .group-btn.active { border-color: var(--gold); background: #fffcf5; }

    .house-board { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin-top: 15px; }
    .house { height: 35px; background: white; border-radius: 5px; display: grid; place-items: center; font-size: 11px; color: #999; border: 1px solid #eee; }
    .house.visited { background: var(--leaf-soft); color: var(--leaf); border-color: var(--leaf); font-weight: bold; }

    .history-item { background: white; padding: 10px; border-radius: 10px; margin-bottom: 5px; font-size: 14px; border-left: 4px solid var(--gold); }
    
    .flex-row { display: flex; gap: 10px; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="hero">
      <div style="font-size: 12px; font-weight: 800; color: var(--gold-dark); text-transform: uppercase;">🐍 Trilha da Herpetofauna 🐸</div>
      <h1 style="margin: 5px 0;">Painel do Professor</h1>
      <div class="flex-row" style="justify-content: center; margin-top: 10px;">
        <button class="btn-secondary" onclick="novaPartida()">✨ Novo</button>
        <button class="btn-secondary" onclick="exportarRelatorio()">📦 Exportar</button>
        <button class="btn-danger" onclick="limparTudo()">🗑️ Reset</button>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-top:0">1. Selecione o Grupo</h3>
      <div id="groupGrid" class="quick-group-grid"></div>
      
      <h3>2. Registro da Jogada</h3>
      <div class="stack">
        <input id="casaInput" type="number" placeholder="Nº da Casa (1-50)" inputmode="numeric">
        <div class="flex-row">
          <button id="btnAcertou" class="btn-success" onclick="setResultado('acertou')">✅ ACERTOU</button>
          <button id="btnErrou" class="btn-error" onclick="setResultado('errou')">❌ ERROU</button>
        </div>
        <button class="btn-primary" onclick="registrar()">🎯 REGISTRAR JOGADA</button>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-top:0">Mapa das 50 Casas</h3>
      <div id="mapaCasas" class="house-board"></div>
    </div>

    <div class="card">
      <h3 style="margin-top:0">Histórico de Jogadas</h3>
      <div id="listaHistorico"></div>
    </div>
  </div>

  <script>
    const KEY = 'herpeto_v3_session';
    let estado = JSON.parse(sessionStorage.getItem(KEY)) || {
      id: Date.now(),
      grupos: Array.from({length: 5}, (_, i) => ({ id: i+1, nome: `Grupo ${i+1}`, pontos: 0, casa: '-' })),
      jogadas: [],
      casasVisitadas: []
    };

    let grupoAtivo = 1;
    let resultadoAtivo = 'acertou';

    function salvar() {
      sessionStorage.setItem(KEY, JSON.stringify(estado));
      render();
    }

    function setResultado(r) {
      resultadoAtivo = r;
      document.getElementById('btnAcertou').style.opacity = r === 'acertou' ? '1' : '0.4';
      document.getElementById('btnErrou').style.opacity = r === 'errou' ? '1' : '0.4';
    }

    function registrar() {
      const casa = parseInt(document.getElementById('casaInput').value);
      if (!casa || casa < 1 || casa > 50) return alert("Insira uma casa de 1 a 50");
      if (estado.casasVisitadas.includes(casa)) return alert("Esta casa já foi usada!");

      const g = estado.grupos.find(x => x.id === grupoAtivo);
      const acertou = resultadoAtivo === 'acertou';

      g.casa = casa;
      if (acertou) g.pontos++;

      estado.casasVisitadas.push(casa);
      estado.jogadas.unshift({
        grupo: g.nome,
        casa: casa,
        resultado: acertou ? 'Acertou' : 'Errou',
        hora: new Date().toLocaleTimeString()
      });

      document.getElementById('casaInput').value = '';
      salvar();
    }

    function exportarRelatorio() {
        const ranking = [...estado.grupos].sort((a,b) => b.pontos - a.pontos);
        let txt = `RELATÓRIO DE PARTIDA - HERPETOFAUNA\nID: ${estado.id}\n\n`;
        
        ranking.forEach((g, i) => {
            txt += `${i+1}º ${g.nome} | Pontos: ${g.pontos} | Última Casa: ${g.casa}\n`;
        });

        const win = window.open('', '_blank');
        if(!win) return alert("Bloqueador de pop-ups ativo! Permita para exportar.");

        win.document.write(`
            <html><head><title>Relatório</title></head>
            <body style="font-family:sans-serif; padding:30px;">
                <h1>Resultado da Partida</h1>
                <pre style="font-size:16px; background:#f4f4f4; padding:20px;">${txt}</pre>
                <script>setTimeout(() => { window.print(); window.close(); }, 500);<\/script>
            </body></html>
        `);
        win.document.close();
    }

    function novaPartida() {
      if(confirm("Reiniciar partida?")) {
        estado = { id: Date.now(), grupos: Array.from({length: 5}, (_, i) => ({ id: i+1, nome: `Grupo ${i+1}`, pontos: 0, casa: '-' })), jogadas: [], casasVisitadas: [] };
        salvar();
      }
    }

    function render() {
      // Grupos
      document.getElementById('groupGrid').innerHTML = estado.grupos.map(g => `
        <div class="group-btn ${g.id === grupoAtivo ? 'active' : ''}" onclick="grupoAtivo=${g.id}; render();">
          <small>ID ${g.id}</small><br><b>${g.nome}</b><br>
          <small>Pts: ${g.pontos} | Casa: ${g.casa}</small>
        </div>
      `).join('');

      // Mapa
      document.getElementById('mapaCasas').innerHTML = Array.from({length: 50}, (_, i) => i + 1).map(c => `
        <div class="house ${estado.casasVisitadas.includes(c) ? 'visited' : ''}">${c}</div>
      `).join('');

      // Histórico
      document.getElementById('listaHistorico').innerHTML = estado.jogadas.map(j => `
        <div class="history-item"><b>${j.grupo}</b> - Casa ${j.casa} (${j.resultado}) <span style="float:right; font-size:10px">${j.hora}</span></div>
      `).join('');
    }

    setResultado('acertou');
    render();
  </script>
</body>
</html>
