<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Trilha da Herpetofauna — Controle do Professor(a)</title>
  <style>
    :root {
      --bg-1: #f6f1e7;
      --bg-2: #e8dcc4;
      --panel: rgba(255, 251, 243, 0.96);
      --ink: #2d241a;
      --muted: #786a57;
      --gold: #b98b3f;
      --gold-dark: #926a2f;
      --leaf: #55753c;
      --leaf-soft: #e6efdc;
      --danger: #b53a2d;
      --danger-soft: #fae2de;
      --shadow: 0 10px 28px rgba(55, 37, 13, 0.12);
      --radius-xl: 24px;
      --radius-lg: 18px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 14px;
      padding-bottom: 110px;
    }

    .hero {
      background: linear-gradient(135deg, rgba(255,250,241,.98), rgba(249,241,223,.98));
      border: 1px solid rgba(185,139,63,.22);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 14px;
      text-align: center;
    }

    .title-badge {
      display: inline-flex;
      padding: 8px 12px;
      background: #f4ead5;
      color: var(--gold-dark);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .card {
      background: var(--panel);
      border: 1px solid rgba(119, 91, 41, 0.14);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 14px;
    }

    .stack { display: grid; gap: 12px; }

    .mobile-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    input {
      width: 100%;
      min-height: 54px;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid #ddcfb7;
      background: #fffdf8;
      font-size: 16px;
    }

    button {
      border-radius: 16px;
      min-height: 56px;
      padding: 14px;
      cursor: pointer;
      font-weight: 800;
      font-size: 16px;
      border: none;
      transition: 0.2s;
    }

    .btn-primary { color: white; background: linear-gradient(180deg, var(--gold), var(--gold-dark)); width: 100%; }
    .btn-success { color: white; background: linear-gradient(180deg, #679549, #4f7838); flex: 1; }
    .btn-error { color: white; background: linear-gradient(180deg, #d65b4f, #b53a2d); flex: 1; }
    .btn-secondary { color: var(--ink); background: #f5ead6; border: 1px solid rgba(185,139,63,.18); }
    .btn-danger { color: white; background: #a93125; }

    .quick-group-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; }
    .group-btn {
      background: white;
      border: 2px solid transparent;
      padding: 12px;
      border-radius: 18px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    .group-btn.active { border-color: var(--gold); background: #fffcf5; box-shadow: 0 0 0 4px rgba(185,139,63,0.1); }

    .house-board { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-top: 15px; }
    .house { 
        height: 40px; background: white; border-radius: 10px; display: grid; 
        place-items: center; font-size: 12px; border: 1px solid #eee; color: #bbb;
    }
    .house.visited { background: var(--leaf-soft); color: var(--leaf); border-color: var(--leaf); font-weight: bold; }

    .placar-item {
      display: grid; grid-template-columns: 50px 1fr auto; gap: 12px; align-items: center;
      padding: 12px; border-radius: 18px; background: white; border: 1px solid #eee; margin-bottom: 8px;
    }
    .posicao { width: 40px; height: 40px; border-radius: 50%; background: var(--gold); color: white; display: grid; place-items: center; font-weight: 900; }

    .history-item { border-radius: 12px; padding: 10px; background: white; margin-bottom: 8px; border-left: 5px solid var(--gold); font-size: 14px; }
    
    @media (max-width: 600px) { .house-board { grid-template-columns: repeat(5, 1fr); } }
  </style>
</head>
<body>

  <div class="wrap">
    <section class="hero">
      <div class="title-badge">🐍 Trilha da Herpetofauna 🐸</div>
      <h1 style="margin:0">Controle do Professor(a)</h1>
      <div class="mobile-actions">
        <button class="btn-secondary" onclick="novaPartida()">✨ Novo</button>
        <button class="btn-secondary" onclick="exportarPDF()">📦 Exportar</button>
        <button class="btn-danger" onclick="limparCache()">🗑️ Reset</button>
      </div>
    </section>

    <div class="card">
      <h2 style="font-size:18px; margin-top:0">1. Selecione o Grupo</h2>
      <div id="gridGrupos" class="quick-group-grid"></div>
      
      <h2 style="font-size:18px; margin-top:15px">2. Registrar Jogada</h2>
      <div class="stack">
        <input id="inputCasa" type="number" placeholder="Digite o número da casa (1-50)" inputmode="numeric">
        <div style="display:flex; gap:10px;">
          <button id="btnAcertou" class="btn-success" onclick="definirStatus('acertou')">✅ Acertou</button>
          <button id="btnErrou" class="btn-error" onclick="definirStatus('errou')">❌ Errou</button>
        </div>
        <button class="btn-primary" onclick="confirmarJogada()">🎯 Confirmar Jogada</button>
      </div>
    </div>

    <div class="card">
      <h2 style="font-size:18px; margin-top:0">Ranking Atual</h2>
      <div id="rankingLista"></div>
      
      <h2 style="font-size:18px; margin-top:20px">Mapa de Exploração</h2>
      <div id="mapa" class="house-board"></div>
    </div>

    <div class="card">
        <h2 style="font-size:18px; margin-top:0">Histórico Recente</h2>
        <div id="historico"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'herpeto_v4_prod';
    let db = JSON.parse(sessionStorage.getItem(STORAGE_KEY)) || {
      grupos: Array.from({length: 5}, (_, i) => ({ id: i+1, nome: `Grupo ${i+1}`, pts: 0, casa: '-' })),
      historico: [],
      visitadas: []
    };

    let idAtivo = 1;
    let statusAtivo = 'acertou';

    function salvar() {
      sessionStorage.setItem(STORAGE_KEY, JSON.stringify(db));
      renderizar();
    }

    function definirStatus(s) {
      statusAtivo = s;
      document.getElementById('btnAcertou').style.filter = s === 'acertou' ? 'brightness(1)' : 'brightness(0.5)';
      document.getElementById('btnErrou').style.filter = s === 'errou' ? 'brightness(1)' : 'brightness(0.5)';
    }

    function confirmarJogada() {
      const casa = parseInt(document.getElementById('inputCasa').value);
      if (!casa || casa < 1 || casa > 50) return alert("Escolha uma casa válida!");
      if (db.visitadas.includes(casa)) return alert("Casa já visitada!");

      const g = db.grupos.find(x => x.id === idAtivo);
      const acertou = statusAtivo === 'acertou';

      g.casa = casa;
      if (acertou) g.pts++;

      db.visitadas.push(casa);
      db.historico.unshift({ texto: `${g.nome} na casa ${casa} (${acertou ? 'Acertou' : 'Errou'})`, hora: new Date().toLocaleTimeString() });

      document.getElementById('inputCasa').value = '';
      salvar();
    }

    function exportarPDF() {
        const ordenado = [...db.grupos].sort((a,b) => b.pts - a.pts);
        let relatorio = `RELATÓRIO DE PARTIDA\n------------------\n`;
        ordenado.forEach((g, i) => {
            relatorio += `${i+1}º - ${g.nome} | Pontos: ${g.pts} | Casa Final: ${g.casa}\n`;
        });

        const win = window.open('', '_blank');
        if(!win) return alert("Habilite pop-ups para gerar o relatório!");

        win.document.write(`
            <html><head><title>Relatório Trilha</title></head>
            <body style="font-family:sans-serif; padding:40px;">
                <h1 style="color:#b98b3f">Trilha da Herpetofauna</h1>
                <pre style="font-size:18px; line-height:1.8;">${relatorio}</pre>
                <script>setTimeout(() => { window.print(); window.close(); }, 500);<\/script>
            </body></html>
        `);
        win.document.close();
    }

    function novaPartida() { if(confirm("Zerar placar?")) { db.grupos.forEach(g => {g.pts=0; g.casa='-';}); db.historico=[]; db.visitadas=[]; salvar(); } }
    function limparCache() { if(confirm("Apagar todos os dados e nomes?")) { sessionStorage.clear(); location.reload(); } }

    function renderizar() {
      // Grupos Seletor
      document.getElementById('gridGrupos').innerHTML = db.grupos.map(g => `
        <div class="group-btn ${g.id === idAtivo ? 'active' : ''}" onclick="idAtivo=${g.id}; renderizar();">
          <small>ID ${g.id}</small><br><b>${g.nome}</b><br>
          <small>Pts: ${g.pts} | Casa: ${g.casa}</small>
        </div>
      `).join('');

      // Ranking
      const rank = [...db.grupos].sort((a,b) => b.pts - a.pts);
      document.getElementById('rankingLista').innerHTML = rank.map((g, i) => `
        <div class="placar-item">
          <div class="posicao">${i+1}</div>
          <b>${g.nome}</b>
          <div style="font-size:20px; font-weight:900; color:var(--leaf)">${g.pts}</div>
        </div>
      `).join('');

      // Mapa
      document.getElementById('mapa').innerHTML = Array.from({length: 50}, (_, i) => i + 1).map(c => `
        <div class="house ${db.visitadas.includes(c) ? 'visited' : ''}">${c}</div>
      `).join('');

      // Histórico
      document.getElementById('historico').innerHTML = db.historico.map(h => `
        <div class="history-item"><b>${h.texto}</b> <span style="float:right; font-size:11px; color:#999">${h.hora}</span></div>
      `).join('');
    }

    definirStatus('acertou');
    renderizar();
  </script>
</body>
</html>
