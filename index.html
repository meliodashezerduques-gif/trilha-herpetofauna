<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Trilha da Herpetofauna — Controle do Professor(a)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-1: #f6f1e7;
            --bg-2: #e8dcc4;
            --panel: rgba(255, 251, 243, 0.96);
            --panel-strong: #fffaf1;
            --ink: #2d241a;
            --muted: #786a57;
            --gold: #b98b3f;
            --gold-dark: #926a2f;
            --leaf: #55753c;
            --leaf-soft: #e6efdc;
            --frog: #4a8d59;
            --snake: #8b5e3c;
            --danger: #b53a2d;
            --danger-soft: #fae2de;
            --line: #ddcfb7;
            --shadow: 0 10px 28px rgba(55, 37, 13, 0.12);
            --radius-xl: 24px;
            --radius-lg: 18px;
            --radius-md: 14px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
            color: var(--ink);
            background: radial-gradient(circle at top left, rgba(255,255,255,.45), transparent 22%),
                        radial-gradient(circle at bottom right, rgba(255,255,255,.32), transparent 20%),
                        linear-gradient(180deg, var(--bg-1), var(--bg-2));
            min-height: 100vh;
        }

        .wrap { max-width: 760px; margin: 0 auto; padding: 14px; padding-bottom: 110px; }

        .hero {
            position: relative; overflow: hidden;
            background: linear-gradient(135deg, rgba(255,250,241,.98), rgba(249,241,223,.98));
            border: 1px solid rgba(185,139,63,.22);
            border-radius: 28px; box-shadow: var(--shadow);
            padding: 18px; margin-bottom: 14px;
        }

        .title-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: #f4ead5; color: var(--gold-dark);
            border: 1px solid rgba(185,139,63,.28);
            border-radius: 999px; padding: 8px 12px;
            font-size: 12px; font-weight: 800; text-transform: uppercase;
            margin-bottom: 10px; position: relative; z-index: 1;
        }

        h1 { margin: 0; font-size: clamp(26px, 6vw, 36px); line-height: 1.04; position: relative; z-index: 1; }
        .subtitle { margin-top: 10px; color: var(--muted); font-size: 14px; position: relative; z-index: 1; }

        .mobile-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }

        .card { background: var(--panel); border: 1px solid rgba(119, 91, 41, 0.14); border-radius: var(--radius-xl); box-shadow: var(--shadow); margin-bottom: 14px; padding: 16px; }

        .section-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .section-note { font-size: 12px; color: var(--muted); }

        .stack { display: grid; gap: 12px; }
        label { display: block; margin-bottom: 6px; font-size: 12px; font-weight: 800; color: var(--muted); text-transform: uppercase; }

        input, select, button { font: inherit; }
        input { width: 100%; min-height: 54px; padding: 14px; border-radius: 16px; border: 1px solid var(--line); background: #fffdf8; }

        button { border: none; border-radius: 16px; min-height: 56px; padding: 14px; cursor: pointer; font-weight: 800; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }

        .btn-primary { color: white; background: linear-gradient(180deg, var(--gold), var(--gold-dark)); }
        .btn-success { color: white; background: linear-gradient(180deg, #679549, #4f7838); }
        .btn-error { color: white; background: linear-gradient(180deg, #d65b4f, #b53a2d); }
        .btn-secondary { color: var(--ink); background: #f5ead6; border: 1px solid rgba(185,139,63,0.18); }
        .btn-danger { color: white; background: #c84b3f; }

        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .summary-box { padding: 14px; border-radius: 18px; background: white; border: 1px solid var(--line); }
        .summary-label { font-size: 11px; color: var(--muted); font-weight: 800; display: block; }

        .notice { padding: 14px; border-radius: 16px; font-size: 14px; margin-top: 12px; display: none; }
        .notice.show { display: block; }
        .notice.info { background: #f2ede5; }
        .notice.ok { background: #e7f3e4; color: var(--leaf); }

        .team-grid { display: grid; gap: 10px; }
        .team-card { padding: 14px; border-radius: 18px; background: white; border: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
        .team-score { background: var(--leaf-soft); color: var(--leaf); padding: 8px 16px; border-radius: 20px; font-weight: 900; }

        .quick-group-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .quick-group-btn { background: white; border: 2px solid transparent; text-align: left; padding: 10px; }
        .quick-group-btn.active { border-color: var(--gold); background: var(--panel-strong); }

        .quick-result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .house-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .house { padding: 10px 2px; border-radius: 8px; border: 1px solid var(--line); text-align: center; font-size: 11px; }
        .house.visited { background: var(--leaf-soft); color: var(--leaf); border-color: var(--leaf); }

        .hidden { display: none !important; }

        @media (min-width: 761px) {
            .wrap { max-width: 900px; }
            .summary-grid { grid-template-columns: repeat(4, 1fr); }
            .house-board { grid-template-columns: repeat(10, 1fr); }
        }
        
        /* Ajuste para exportação */
        .no-export { display: none !important; }
    </style>
</head>
<body>
    <div class="wrap" id="conteudo-para-pdf">
        <section class="hero">
            <div class="title-badge">🐍 Trilha da Herpetofauna 🐸</div>
            <h1>Controle do Professor(a)</h1>
            <div class="subtitle">Acompanhamento das equipes e pontuação em tempo real.</div>
            <div class="mobile-actions">
                <button class="btn-secondary" id="btnNovaPartida">✨ Nova Partida</button>
                <button class="btn-secondary" id="btnExportar">📦 Exportar PDF</button>
                <button class="btn-danger" id="btnResetar">🗑️ Apagar</button>
            </div>
        </section>

        <section class="card">
            <div class="section-head">
                <h2>Equipes</h2>
                <button class="btn-secondary" id="btnToggleEquipes">Ocultar</button>
            </div>
            <div id="equipesContent" class="stack">
                <div id="grupoInputs" class="stack"></div>
                <div id="teamPreview"></div>
            </div>
        </section>

        <section class="card">
            <div class="summary-grid" id="resumoMeta"></div>
            <div class="notice info show" id="statusPartida">Nenhuma jogada registrada.</div>
        </section>

        <section class="card">
            <h2>Registrar Jogada</h2>
            <div class="stack">
                <label>Grupo</label>
                <div id="quickGroupGrid" class="quick-group-grid"></div>
                <label>Casa (1-50)</label>
                <input id="casaInput" type="number" min="1" max="50" inputmode="numeric">
                <div class="quick-result-grid">
                    <button class="btn-success" id="btnAcertou">✅ Acertou</button>
                    <button class="btn-error" id="btnErrou">❌ Errou</button>
                </div>
                <button class="btn-primary" id="btnRegistrar">🎯 Registrar Jogada</button>
                <button class="btn-secondary" id="btnDesfazer">↩️ Desfazer</button>
            </div>
            <div class="notice" id="feedback"></div>
        </section>

        <section class="card">
            <h2>Ranking</h2>
            <div id="tabelaPlacar"></div>
        </section>

        <section class="card">
            <div class="section-head">
                <h2>Mapa de Casas</h2>
                <button class="btn-secondary" id="btnToggleCasas">Ocultar</button>
            </div>
            <div id="casasContent">
                <div id="casasVisitadas" class="house-board"></div>
            </div>
        </section>
    </div>

    <script>
        const STORAGE_KEY = 'trilha_herpeto_v1';
        const TOTAL_GRUPOS = 5;
        const TOTAL_CASAS = 50;

        let grupoSelecionadoId = 1;
        let resultadoSelecionado = 'acertou';

        // Inicialização do Estado
        let estado = JSON.parse(sessionStorage.getItem(STORAGE_KEY)) || {
            id: `ID-${Math.floor(Math.random() * 10000)}`,
            criadaEm: new Date().toLocaleString(),
            grupos: Array.from({length: TOTAL_GRUPOS}, (_, i) => ({
                id: i + 1, nome: `Grupo ${i+1}`, casaAtual: '-', pontos: 0
            })),
            jogadas: [],
            casasVisitadas: []
        };

        function salvar() {
            sessionStorage.setItem(STORAGE_KEY, JSON.stringify(estado));
            render();
        }

        function render() {
            // Renderizar Inputs de Nomes
            const inputsDiv = document.getElementById('grupoInputs');
            if(inputsDiv.innerHTML === "") {
                estado.grupos.forEach((g, i) => {
                    const div = document.createElement('div');
                    div.innerHTML = `<label>Nome ${g.id}</label>
                        <input value="${g.nome}" onchange="atualizarNome(${g.id}, this.value)">`;
                    inputsDiv.appendChild(div);
                });
            }

            // Quick Buttons
            const grid = document.getElementById('quickGroupGrid');
            grid.innerHTML = estado.grupos.map(g => `
                <button class="quick-group-btn ${g.id === grupoSelecionadoId ? 'active' : ''}" 
                        onclick="selecionarGrupo(${g.id})">
                    <b>${g.nome}</b><br><small>Casa: ${g.casaAtual}</small>
                </button>
            `).join('');

            // Ranking
            const ranking = [...estado.grupos].sort((a,b) => b.pontos - a.pontos);
            document.getElementById('tabelaPlacar').innerHTML = ranking.map((g, i) => `
                <div class="team-card">
                    <span>${i+1}º ${g.nome} (Casa ${g.casaAtual})</span>
                    <span class="team-score">${g.pontos} pts</span>
                </div>
            `).join('');

            // Mapa
            const mapa = document.getElementById('casasVisitadas');
            mapa.innerHTML = Array.from({length: TOTAL_CASAS}, (_, i) => i + 1).map(n => `
                <div class="house ${estado.casasVisitadas.includes(n) ? 'visited' : ''}">${n}</div>
            `).join('');

            // Resumo
            document.getElementById('resumoMeta').innerHTML = `
                <div class="summary-box"><span class="summary-label">Partida</span>${estado.id}</div>
                <div class="summary-box"><span class="summary-label">Jogadas</span>${estado.jogadas.length}</div>
            `;
        }

        window.atualizarNome = (id, novoNome) => {
            const g = estado.grupos.find(x => x.id === id);
            if(g) g.nome = novoNome;
            salvar();
        };

        window.selecionarGrupo = (id) => {
            grupoSelecionadoId = id;
            render();
        };

        document.getElementById('btnAcertou').onclick = () => { resultadoSelecionado = 'acertou'; alert('Marcado: Acertou'); };
        document.getElementById('btnErrou').onclick = () => { resultadoSelecionado = 'errou'; alert('Marcado: Errou'); };

        document.getElementById('btnRegistrar').onclick = () => {
            const casa = parseInt(document.getElementById('casaInput').value);
            if(!casa || casa < 1 || casa > 50) return alert("Casa inválida");
            if(estado.casasVisitadas.includes(casa)) return alert("Casa já visitada");

            const grupo = estado.grupos.find(g => g.id === grupoSelecionadoId);
            const pontosGanhos = resultadoSelecionado === 'acertou' ? 1 : 0;
            
            grupo.casaAtual = casa;
            grupo.pontos += pontosGanhos;
            estado.casasVisitadas.push(casa);
            estado.jogadas.push({ grupoId: grupo.id, casa, pontosGanhos });

            document.getElementById('casaInput').value = "";
            salvar();
        };

        document.getElementById('btnDesfazer').onclick = () => {
            if(estado.jogadas.length === 0) return;
            const ultima = estado.jogadas.pop();
            const grupo = estado.grupos.find(g => g.id === ultima.grupoId);
            grupo.pontos -= ultima.pontosGanhos;
            estado.casasVisitadas = estado.casasVisitadas.filter(c => c !== ultima.casa);
            
            const penultima = [...estado.jogadas].reverse().find(j => j.grupoId === grupo.id);
            grupo.casaAtual = penultima ? penultima.casa : '-';
            salvar();
        };

        document.getElementById('btnExportar').onclick = () => {
            const element = document.getElementById('conteudo-para-pdf');
            const opt = {
                margin: 10,
                filename: `Resultado_${estado.id}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        };

        document.getElementById('btnResetar').onclick = () => {
            if(confirm("Apagar tudo?")) {
                sessionStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        };

        // Toggle Visual
        document.getElementById('btnToggleEquipes').onclick = () => document.getElementById('equipesContent').classList.toggle('hidden');
        document.getElementById('btnToggleCasas').onclick = () => document.getElementById('casasContent').classList.toggle('hidden');

        render();
    </script>
</body>
</html>
